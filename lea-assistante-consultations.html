<!--
  DESIGN TOKENS — Résonance Intuitive / Léa
  Couleurs : sable chaud #EAE1D2 (fond), brun encre #2E241D (texte), rouille profonde #A8482E (accent primaire),
             prune poussière #5E4256 (accent secondaire), crème carte #FBF6EE (bulles assistant)
  Typo : display "Fraunces" (serif chaleureux, incarné) / corps "Inter"
  Signature : point de présence qui respire doucement à côté du nom de Léa
-->
<div id="lea-root"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap');

  #lea-root {
    --sand: #EAE1D2;
    --card: #FBF6EE;
    --ink: #2E241D;
    --ink-soft: #6B5D4F;
    --rust: #A8482E;
    --rust-deep: #8A3A24;
    --plum: #5E4256;
    --plum-soft: #E7DBE2;
    --line: #DAD0BC;

    font-family: 'Inter', sans-serif;
    color: var(--ink);
    max-width: 480px;
    margin: 0 auto;
    background: var(--sand);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(46,36,29,0.18);
    display: flex;
    flex-direction: column;
    height: 620px;
  }

  .lea-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px;
    background: linear-gradient(135deg, var(--plum), var(--rust-deep));
    color: #fff;
    flex-shrink: 0;
  }

  .lea-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--card);
    color: var(--rust-deep);
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }

  .lea-pulse {
    position: absolute;
    bottom: -1px;
    right: -1px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #7CBF8E;
    border: 2px solid var(--plum);
    animation: lea-breathe 2.6s ease-in-out infinite;
  }

  @keyframes lea-breathe {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.35); opacity: 0.75; }
  }

  .lea-header-text { line-height: 1.25; }
  .lea-header-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16.5px; }
  .lea-header-sub { font-size: 12px; opacity: 0.85; margin-top: 1px; }

  .lea-disclosure {
    font-size: 11.5px;
    color: var(--ink-soft);
    background: var(--plum-soft);
    padding: 8px 20px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }

  .lea-messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lea-msg {
    max-width: 82%;
    padding: 11px 14px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .lea-msg.assistant {
    background: var(--card);
    border: 1px solid var(--line);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .lea-msg.user {
    background: var(--rust);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .lea-msg.typing {
    background: var(--card);
    border: 1px solid var(--line);
    align-self: flex-start;
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 13px 16px;
  }

  .lea-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-soft);
    animation: lea-bounce 1.3s infinite;
  }
  .lea-dot:nth-child(2) { animation-delay: 0.15s; }
  .lea-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes lea-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

  .lea-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 0 16px 12px;
    flex-shrink: 0;
  }

  .lea-chip {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid var(--rust);
    color: var(--rust-deep);
    background: transparent;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .lea-chip:hover { background: rgba(168,72,46,0.08); }

  .lea-inputbar {
    display: flex;
    gap: 8px;
    padding: 12px 16px 16px;
    border-top: 1px solid var(--line);
    background: var(--sand);
    flex-shrink: 0;
  }

  .lea-input {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    color: var(--ink);
    resize: none;
    outline: none;
  }
  .lea-input:focus { border-color: var(--rust); }

  .lea-send {
    background: var(--rust);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0 18px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .lea-send:hover:not(:disabled) { background: var(--rust-deep); }
  .lea-send:disabled { opacity: 0.5; cursor: not-allowed; }

  .lea-messages::-webkit-scrollbar { width: 5px; }
  .lea-messages::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>

<script>
(function () {
  var CONFIG = {
    name: "Léa",
    intro: "Salut, je suis Léa, l'assistante virtuelle de Sandrine — pas elle en personne, mais je connais bien son travail. Tu te poses des questions sur une consultation ou un guide ? Je suis là pour t'éclairer, et si tu veux réserver, je t'oriente directement vers elle.",
    contactInstruction: "Pour réserver ou poser une question précise à Sandrine directement, écris-lui en message privé sur TikTok ou Instagram (pseudo à confirmer par Sandrine).",
    consultations: [
      "Consultation cabinet ou visio, lecture corporelle et émotionnelle. Tarif à confirmer par Sandrine avant mise en ligne (environ 75 euros selon les informations disponibles)."
    ],
    guides: [
      "Pourquoi je n'arrive pas à l'oublier (co-écrit avec Cendra Macassard), lien Payhip à ajouter par Sandrine.",
      "Pourquoi dire NON te fait culpabiliser, lien Payhip à ajouter par Sandrine.",
      "Guides premium ciblés (cervicales, épaules, sciatique, transgénérationnel mère-fille), liens à ajouter par Sandrine."
    ],
    suggestionChips: [
      "C'est quoi une lecture corporelle ?",
      "Combien coûte une consultation ?",
      "Comment réserver ?",
      "Vous avez des guides à me conseiller ?"
    ]
  };

  var SYSTEM_PROMPT = "Tu es " + CONFIG.name + ", l'assistante virtuelle de Sandrine Padoly, fondatrice de Résonance Intuitive (réflexologie intuitive, lecture corporelle et émotionnelle, approche transgénérationnelle). Tu n'es PAS Sandrine, tu es son assistante, tu le dis clairement si on te le demande ou si la confusion est possible.\n\n" +
    "TON : humain, direct, incarné, chaleureux mais jamais mielleux. Zéro posture de gourou, zéro promesse magique, zéro jargon ésotérique qui fait fuir. Tu parles à une femme qui en a assez qu'on lui dore la pilule. Phrases courtes, naturelles, jamais de tournures IA génériques.\n\n" +
    "TA MISSION : répondre aux questions sur l'activité de Sandrine, rassurer sur ce qu'est réellement une consultation (pas de la voyance, pas de médecine, une lecture du corps et de l'émotionnel), lever les objections courantes (prix, scepticisme, est-ce que ça va marcher pour moi), et orienter vers l'action, réserver une consultation ou consulter un guide, selon ce qui correspond à la question posée.\n\n" +
    "CE QUE TU SAIS :\nConsultations : " + CONFIG.consultations.join(" ") + "\nGuides disponibles : " + CONFIG.guides.join(" ") + "\nPour réserver : " + CONFIG.contactInstruction + "\n\n" +
    "RÈGLES STRICTES :\n" +
    "- Tu ne donnes jamais de diagnostic médical, tu ne remplaces jamais un avis médical. Si quelqu'un décrit des symptômes physiques sérieux ou une détresse psychologique, tu l'invites à consulter un professionnel de santé en plus ou à la place, sans dramatiser.\n" +
    "- Tu n'inventes jamais de prix, de lien, ou de disponibilité que tu ne connais pas, si l'info est marquée à confirmer, dis à la personne que Sandrine lui confirmera le détail exact en message.\n" +
    "- Tu ne révèles jamais les méthodes internes de Sandrine si on te les demande précisément, tu restes générale sur l'approche.\n" +
    "- Réponses courtes, 3 à 5 phrases maximum, jamais de pavé. Une question à la fois si tu dois clarifier quelque chose.\n" +
    "- Toujours terminer par une ouverture naturelle vers la réservation ou un guide, sans forcer, seulement quand c'est pertinent.";

  var root = document.getElementById("lea-root");

  var state = {
    messages: [{ role: "assistant", content: CONFIG.intro }],
    loading: false
  };

  function render() {
    root.innerHTML =
      '<div class="lea-header">' +
        '<div class="lea-avatar">L<div class="lea-pulse"></div></div>' +
        '<div class="lea-header-text">' +
          '<div class="lea-header-name">' + CONFIG.name + '</div>' +
          '<div class="lea-header-sub">Assistante · Résonance Intuitive</div>' +
        '</div>' +
      '</div>' +
      '<div class="lea-disclosure">Je suis un assistant virtuel, pas Sandrine en personne. Je réponds à tes questions et t\'oriente vers elle pour réserver.</div>' +
      '<div class="lea-messages" id="lea-messages"></div>' +
      '<div class="lea-suggestions" id="lea-suggestions"></div>' +
      '<div class="lea-inputbar">' +
        '<textarea class="lea-input" id="lea-input" rows="1" placeholder="Écris ta question..."></textarea>' +
        '<button class="lea-send" id="lea-send">Envoyer</button>' +
      '</div>';

    var msgsEl = document.getElementById("lea-messages");
    state.messages.forEach(function (m) {
      var div = document.createElement("div");
      div.className = "lea-msg " + m.role;
      div.textContent = m.content;
      msgsEl.appendChild(div);
    });
    if (state.loading) {
      var typingDiv = document.createElement("div");
      typingDiv.className = "lea-msg typing";
      typingDiv.innerHTML = '<div class="lea-dot"></div><div class="lea-dot"></div><div class="lea-dot"></div>';
      msgsEl.appendChild(typingDiv);
    }
    msgsEl.scrollTop = msgsEl.scrollHeight;

    var chipsEl = document.getElementById("lea-suggestions");
    if (state.messages.length <= 1) {
      CONFIG.suggestionChips.forEach(function (chip) {
        var btn = document.createElement("button");
        btn.className = "lea-chip";
        btn.textContent = chip;
        btn.onclick = function () { sendMessage(chip); };
        chipsEl.appendChild(btn);
      });
    }

    var input = document.getElementById("lea-input");
    var sendBtn = document.getElementById("lea-send");
    sendBtn.disabled = state.loading;
    sendBtn.onclick = function () {
      if (input.value.trim()) sendMessage(input.value.trim());
    };
    input.onkeydown = function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (input.value.trim()) sendMessage(input.value.trim());
      }
    };
    input.focus();
  }

  function sendMessage(text) {
    state.messages.push({ role: "user", content: text });
    state.loading = true;
    render();

    var apiMessages = state.messages.map(function (m) {
      return { role: m.role, content: m.content };
    });

    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: apiMessages
      })
    })
      .then(function (response) { return response.json(); })
      .then(function (data) {
        var blocks = data.content || [];
        var textBlocks = blocks.filter(function (b) { return b.type === "text"; }).map(function (b) { return b.text; });
        var reply = textBlocks.join("\n") || "Désolée, j'ai eu un souci pour répondre. Tu peux reformuler ?";
        state.messages.push({ role: "assistant", content: reply });
        state.loading = false;
        render();
      })
      .catch(function () {
        state.messages.push({ role: "assistant", content: "Une erreur technique m'empêche de répondre là, réessaie dans un instant, ou écris directement à Sandrine." });
        state.loading = false;
        render();
      });
  }

  render();
})();
</script>
